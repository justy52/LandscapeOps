name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Install, lint, typecheck, and build
    runs-on: ubuntu-latest

    env:
      # Clerk requires a publishable key at build time even without a real Clerk app.
      # This placeholder satisfies the build-time check; real keys live in deployment env vars.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dGVzdGtleWZvcmNpYnVpbGRvbmx5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm install

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
